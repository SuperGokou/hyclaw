<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>凭证保险箱 · HYClaw</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 22px 24px 28px; font-family: "Segoe UI","Microsoft YaHei",sans-serif;
    background: light-dark(#faf8f5,#1b1b1f); color: light-dark(#26262a,#e4e4e8);
  }
  h1 { font-size: 1.2rem; margin: 0 0 4px; }
  .sub { color: light-dark(#6b6b73,#9a9aa4); font-size: .82rem; margin: 0 0 14px; line-height: 1.5; }
  .meta {
    font-size: .76rem; color: light-dark(#7a7a82,#8f8f99);
    background: light-dark(#efece7,#26262a); border-radius: 8px; padding: 8px 10px; margin-bottom: 16px;
    word-break: break-all;
  }
  .meta b { color: light-dark(#26262a,#e4e4e8); font-weight: 600; }
  .warn { color: #c8281e; }
  .card {
    background: light-dark(#fff,#232329); border: 1px solid light-dark(#e6e2dc,#33333b);
    border-radius: 12px; padding: 16px; margin-bottom: 14px;
  }
  label { display: block; font-size: .78rem; font-weight: 600; margin: 0 0 5px; }
  input {
    width: 100%; font: inherit; padding: 8px 11px; border-radius: 7px;
    border: 1px solid light-dark(#d9d9df,#3a3a42); background: light-dark(#fff,#1b1b1f); color: inherit;
  }
  input:focus { outline: 2px solid #ff7a1a; outline-offset: 1px; border-color: #ff7a1a; }
  .field { margin-bottom: 12px; }
  .envhint { font-size: .74rem; color: light-dark(#7a7a82,#8f8f99); margin-top: 5px; min-height: 1em; }
  .envhint code { color: #e8781a; font-weight: 600; }
  .actions { display: flex; align-items: center; gap: 12px; }
  button.primary {
    background: #ff7a1a; color: #fff; border: none; cursor: pointer;
    padding: 9px 20px; border-radius: 8px; font: inherit; font-weight: 600;
  }
  button.primary:hover { background: #e8781a; }
  .status { font-size: .82rem; font-weight: 600; }
  .status.ok { color: #2ea44f; }
  .status.err { color: #c8281e; }
  h2 { font-size: .9rem; margin: 18px 0 8px; color: light-dark(#4a4a52,#c4c4cc); }
  ul { list-style: none; padding: 0; margin: 0; }
  li {
    display: flex; justify-content: space-between; align-items: center; gap: 10px;
    padding: 10px 12px; border: 1px solid light-dark(#e6e2dc,#33333b); border-radius: 9px; margin-bottom: 7px;
    background: light-dark(#fff,#232329);
  }
  .li-main { min-width: 0; }
  .li-id { font-weight: 600; }
  .li-env { font-size: .74rem; color: light-dark(#7a7a82,#8f8f99); }
  .li-env code { color: #e8781a; }
  .empty { color: light-dark(#9a9aa4,#6b6b73); font-size: .82rem; padding: 6px 2px; }
  button.del { border: none; background: transparent; color: #c8281e; cursor: pointer; font: inherit; }
  button.del:hover { text-decoration: underline; }
  .restart {
    margin-top: 4px; font-size: .78rem; color: light-dark(#8a5a00,#e0a94f);
    background: light-dark(#fff3e0,#2a2418); border-radius: 7px; padding: 7px 10px; display: none;
  }
  .restart.show { display: block; }
</style>
</head>
<body>
<h1>凭证保险箱 · Credential Vault</h1>
<p class="sub">
  密钥经操作系统加密后保存(Windows DPAPI / macOS 钥匙串),配置文件里只留占位符,永不明文落盘。<br />
  在模型配置中用 <code>${'$'}{HYCLAW_CRED_&lt;ID&gt;}</code> 引用已保存的密钥。
</p>
<div class="meta" id="meta">正在读取保险箱信息…</div>

<div class="card">
  <div class="field">
    <label for="pid">供应商 ID / Provider ID</label>
    <input id="pid" placeholder="如 nvidia / deepseek / qwen" autocomplete="off" />
    <div class="envhint" id="envhint"></div>
  </div>
  <div class="field">
    <label for="secret">API 密钥 / API Key</label>
    <input id="secret" type="password" placeholder="粘贴密钥" autocomplete="off" />
  </div>
  <div class="actions">
    <button class="primary" id="save">保存到保险箱 / Save</button>
    <span class="status" id="status"></span>
  </div>
  <div class="restart" id="restart">✔ 已加密保存。新密钥将在<b>下次启动应用</b>时注入网关生效。</div>
</div>

<h2>已保存的凭证 / Stored credentials</h2>
<ul id="list"></ul>

<script>
  const $ = (id) => document.getElementById(id);
  const statusEl = $("status"), restartEl = $("restart"), listEl = $("list");

  function toEnv(id) {
    return "HYCLAW_CRED_" + id.trim().toUpperCase().replace(/[^A-Z0-9_]/g, "_");
  }
  function setStatus(text, kind) {
    statusEl.textContent = text;
    statusEl.className = "status " + (kind || "");
  }

  async function loadMeta() {
    try {
      const m = await window.hyclawVault.meta();
      const enc = m.encryptionAvailable
        ? '加密后端:<b>可用</b>'
        : '<span class="warn">加密后端不可用,暂时无法安全保存</span>';
      $("meta").innerHTML = '保存位置:<b>' + m.vaultPath + '</b><br />' + enc;
    } catch (e) {
      $("meta").innerHTML = '<span class="warn">无法读取保险箱信息:' + e + '</span>';
    }
  }

  async function refresh() {
    const entries = await window.hyclawVault.list();
    listEl.innerHTML = "";
    if (!entries.length) {
      const li = document.createElement("li");
      li.innerHTML = '<span class="empty">还没有保存任何凭证。</span>';
      listEl.appendChild(li);
      return;
    }
    for (const e of entries) {
      const li = document.createElement("li");
      const main = document.createElement("div");
      main.className = "li-main";
      main.innerHTML = '<div class="li-id">' + e.providerId +
        '</div><div class="li-env"><code>${' + e.envVar + '}</code></div>';
      const del = document.createElement("button");
      del.className = "del"; del.textContent = "删除 / Delete";
      del.onclick = async () => {
        await window.hyclawVault.remove(e.providerId);
        setStatus("已删除 " + e.providerId, "ok");
        refresh();
      };
      li.append(main, del);
      listEl.appendChild(li);
    }
  }

  $("pid").addEventListener("input", (ev) => {
    const id = ev.target.value.trim();
    $("envhint").innerHTML = id ? '配置中引用:<code>${' + toEnv(id) + '}</code>' : "";
  });

  $("save").onclick = async () => {
    const pid = $("pid").value.trim();
    const secret = $("secret").value;
    setStatus("保存中…", "");
    restartEl.classList.remove("show");
    const res = await window.hyclawVault.set(pid, secret);
    if (!res.ok) { setStatus("✖ " + (res.error || "保存失败"), "err"); return; }
    setStatus("✔ 已保存:" + res.providerId, "ok");
    restartEl.classList.add("show");
    $("secret").value = ""; $("pid").value = ""; $("envhint").innerHTML = "";
    refresh();
  };

  loadMeta();
  refresh();
</script>
</body>
</html>
